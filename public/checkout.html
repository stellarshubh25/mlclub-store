<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — ML Club Store</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="inner">
    <a href="/" class="brand">
      <span class="mark">ML//</span>
      <span class="name">Club Store</span>
    </a>
    <nav class="header-nav">
      <a href="/orders.html">Order history</a>
      <a href="/cart.html" class="cart-pill">Cart (<span id="cart-count">0</span>)</a>
    </nav>
  </div>
</header>

<main class="wrap" style="padding-top:32px;max-width:640px;">
  <div class="step-track">
    <span class="step active"><span class="dot"></span>Delivery details</span>
    <span class="sep"></span>
    <span class="step"><span class="dot"></span>Verify email</span>
    <span class="sep"></span>
    <span class="step"><span class="dot"></span>Payment</span>
  </div>

  <h2 class="section-title">Delivery details</h2>
  <div class="panel">
    <form id="checkout-form">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" required autocomplete="name">
      </div>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="contact">Contact number</label>
        <input type="tel" id="contact" required autocomplete="tel" placeholder="+91 XXXXXXXXXX">
      </div>
      <div class="field">
        <label for="address">Delivery address</label>
        <textarea id="address" required autocomplete="street-address" placeholder="Hostel / room / street, city, state, PIN"></textarea>
      </div>
      <button type="submit" class="btn accent block" id="submit-btn">Send verification code</button>
      <p class="error-text" id="error-text"></p>
    </form>
  </div>
</main>

<footer>ML Club Store — built by students, for students.</footer>

<script src="/js/cart.js"></script>
<script>
const cart = getCart();
if (cart.length === 0) {
  window.location.href = "/cart.html";
}

const form = document.getElementById("checkout-form");
const errorText = document.getElementById("error-text");
const submitBtn = document.getElementById("submit-btn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorText.textContent = "";
  submitBtn.disabled = true;
  submitBtn.innerHTML = `<span class="spinner"></span> Sending code…`;

  const payload = {
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    contact_number: document.getElementById("contact").value.trim(),
    delivery_address: document.getElementById("address").value.trim(),
    items: cart,
  };

  try {
    const res = await fetch("/api/otp/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Something went wrong.");

    sessionStorage.setItem("mlclub_checkout_email", payload.email);
    if (data.devOtp) sessionStorage.setItem("mlclub_dev_otp", data.devOtp);
    window.location.href = "/verify.html";
  } catch (err) {
    errorText.textContent = err.message;
    submitBtn.disabled = false;
    submitBtn.textContent = "Send verification code";
  }
});
</script>
</body>
</html>
