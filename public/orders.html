<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order history — ML Club Store</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="inner">
    <a href="/" class="brand">
      <span class="mark">ML//</span>
      <span class="name">Club Store</span>
    </a>
    <nav class="header-nav">
      <a href="/orders.html">Order history</a>
      <a href="/cart.html" class="cart-pill">Cart (<span id="cart-count">0</span>)</a>
    </nav>
  </div>
</header>

<main class="wrap" style="padding-top:32px;max-width:640px;">
  <h2 class="section-title">Order history</h2>
  <div class="panel">
    <form id="lookup-form" style="display:flex;gap:10px;align-items:flex-end;">
      <div class="field" style="flex:1;margin-bottom:0;">
        <label for="email">Email address</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <button type="submit" class="btn">Look up</button>
    </form>
  </div>

  <div id="results" style="margin-top:24px;"></div>
</main>

<footer>ML Club Store — built by students, for students.</footer>

<script src="/js/cart.js"></script>
<script>
const savedEmail = sessionStorage.getItem("mlclub_last_lookup_email");
if (savedEmail) document.getElementById("email").value = savedEmail;

const form = document.getElementById("lookup-form");
const results = document.getElementById("results");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  sessionStorage.setItem("mlclub_last_lookup_email", email);
  results.innerHTML = `<p class="empty-state">Loading…</p>`;

  const res = await fetch(`/api/orders/history/${encodeURIComponent(email)}`);
  const data = await res.json();
  const orders = data.orders || [];

  if (orders.length === 0) {
    results.innerHTML = `<p class="empty-state">No orders found for this email.</p>`;
    return;
  }

  results.innerHTML = orders.map(o => `
    <div class="order-card">
      <div class="top-row">
        <span>${o.id}</span>
        <span class="badge ${o.payment_status === 'paid' ? 'green' : 'muted'}">${o.payment_status}</span>
      </div>
      <div class="items">${o.items.map(i => `${i.name} × ${i.quantity}`).join(", ")}</div>
      <div class="summary-line" style="padding:8px 0 0;">
        <span style="font-family:var(--font-mono);font-size:12px;color:var(--muted);">${new Date(o.created_at).toLocaleString()}</span>
        <span class="price">${o.total_amount.toFixed(2)}</span>
      </div>
    </div>
  `).join("");
});

if (savedEmail) form.dispatchEvent(new Event("submit"));
</script>
</body>
</html>
