<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment — ML Club Store</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="inner">
    <a href="/" class="brand">
      <span class="mark">ML//</span>
      <span class="name">Club Store</span>
    </a>
    <nav class="header-nav">
      <a href="/orders.html">Order history</a>
      <a href="/cart.html" class="cart-pill">Cart (<span id="cart-count">0</span>)</a>
    </nav>
  </div>
</header>

<main class="wrap">
  <div class="step-track">
    <span class="step"><span class="dot"></span>Delivery details</span>
    <span class="sep"></span>
    <span class="step"><span class="dot"></span>Verify email</span>
    <span class="sep"></span>
    <span class="step active"><span class="dot"></span>Payment</span>
  </div>

  <div class="center-panel" style="max-width:480px;">
    <h2 class="section-title" style="justify-content:center;">Payment</h2>
    <div class="panel" id="payment-panel">
      <p class="empty-state">Loading order…</p>
    </div>
  </div>
</main>

<footer>ML Club Store — built by students, for students.</footer>

<script src="/js/cart.js"></script>
<script>
const orderId = sessionStorage.getItem("mlclub_order_id");
if (!orderId) window.location.href = "/checkout.html";

const panel = document.getElementById("payment-panel");

async function loadOrder() {
  const res = await fetch(`/api/orders/${orderId}`);
  const data = await res.json();
  if (!res.ok) {
    panel.innerHTML = `<p class="empty-state">${data.error}</p>`;
    return;
  }
  const { order } = data;
  panel.innerHTML = `
    <div style="text-align:left;">
      ${order.items.map(i => `
        <div class="summary-line"><span>${i.name} × ${i.quantity}</span><span>₹${(i.price*i.quantity).toFixed(2)}</span></div>
      `).join("")}
      <div class="summary-line total"><span>Total due</span><span>₹${order.total_amount.toFixed(2)}</span></div>
    </div>
    <p style="font-family:var(--font-mono);font-size:12px;color:var(--muted);margin-top:16px;">
      This is a simulated payment for demo purposes. No real transaction will occur. Swap this step for Razorpay/Stripe when you're ready to accept real payments.
    </p>
    <button class="btn accent block" id="pay-btn" style="margin-top:14px;">Pay ₹${order.total_amount.toFixed(2)} (simulate)</button>
    <p class="error-text" id="error-text"></p>
  `;

  document.getElementById("pay-btn").addEventListener("click", async () => {
    const btn = document.getElementById("pay-btn");
    const errorText = document.getElementById("error-text");
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Processing payment…`;

    // Small artificial delay so the "processing" state actually reads.
    await new Promise(r => setTimeout(r, 900));

    try {
      const res = await fetch(`/api/orders/${orderId}/pay`, { method: "POST" });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Payment failed.");
      clearCart();
      window.location.href = "/confirmation.html";
    } catch (err) {
      errorText.textContent = err.message;
      btn.disabled = false;
      btn.textContent = `Pay ₹${order.total_amount.toFixed(2)} (simulate)`;
    }
  });
}

loadOrder();
</script>
</body>
</html>
